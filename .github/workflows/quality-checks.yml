name: ✅ Quality Checks
on: [ push ]

jobs:
  perform-checks:
    name: Perform checks
    runs-on: aks-spot-4cpu
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Lint code
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: "check"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run unit tests
        run: |
          uv sync --python ${{ matrix.python-version }} --all-extras --dev
          uv run --python ${{ matrix.python-version }} python -c "
          import rapyuta_io_sdk_v2
          from rapyuta_io_sdk_v2 import Client, AsyncClient
          from rapyuta_io_sdk_v2.pydantic_source.source import ConfigTreeSource
          print('smoke imports OK')
          "
          uv run --python ${{ matrix.python-version }} pytest tests/ --cov